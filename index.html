<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus Bharat | Indian Survival Engine 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: #010409; color: #e6edf3; font-family: 'Rajdhani', sans-serif; }
        .india-glass { background: rgba(13, 17, 23, 0.8); border: 1px solid #30363d; border-radius: 16px; }
        .crisis-border { border-top: 4px solid #ef4444 !important; background: linear-gradient(to bottom, #1a0505, #010409); }
        .neo-input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 10px; border-radius: 8px; width: 100%; }
        .neo-input:focus { border-color: #58a6ff; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">

    <header class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-orange-500 rounded-sm flex items-center justify-center font-bold text-white italic">B</div>
            <div>
                <h1 class="text-xl font-bold tracking-tight uppercase">Nexus<span id="header_title" class="text-emerald-500 ml-1">Bharat</span></h1>
                <p class="text-[9px] text-gray-500 font-bold tracking-widest uppercase">RBI AA-Compliant Survival Logic</p>
            </div>
        </div>
        <div class="flex items-center gap-4 india-glass px-5 py-2">
            <span class="text-[10px] font-bold uppercase text-gray-400">War/Crisis Protocol</span>
            <input type="checkbox" id="war_toggle" onchange="toggleWar()" class="w-10 h-5 bg-gray-700 rounded-full appearance-none checked:bg-red-600 cursor-pointer transition relative">
        </div>
    </header>

    <main class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6">
        
        <aside class="lg:col-span-4 space-y-4">
            <div id="input_card" class="india-glass p-6 border-t-4 border-emerald-500 transition-all">
                <h3 class="text-xs font-bold text-gray-400 uppercase mb-5">Step 1: Discover Assets</h3>
                <div class="space-y-4">
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Monthly Essential Spend (₹)</label>
                        <input type="number" id="in_burn" oninput="run()" class="neo-input" placeholder="e.g. 45000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Bank/UPI Balances (₹)</label>
                        <input type="number" id="in_digital" oninput="run()" class="neo-input" placeholder="e.g. 500000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Physical Cash (Home) (₹)</label>
                        <input type="number" id="in_hand" oninput="run()" class="neo-input" placeholder="e.g. 10000">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-gray-500 uppercase">Annual CTC (₹)</label>
                        <input type="number" id="in_income" oninput="run()" class="neo-input" placeholder="e.g. 1500000">
                    </div>
                </div>
            </div>
        </aside>

        <section class="lg:col-span-8 space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="india-glass p-6">
                    <h4 class="text-[10px] font-bold text-gray-500 uppercase">Survival Runway</h4>
                    <div class="flex items-baseline gap-2 mt-1">
                        <span id="out_runway" class="text-5xl font-bold text-white">0.0</span>
                        <span class="text-[10px] font-bold text-gray-500 uppercase">Months</span>
                    </div>
                    <div class="w-full bg-gray-800 h-1 mt-4 rounded-full overflow-hidden">
                        <div id="runway_bar" class="h-full bg-emerald-500 transition-all duration-700" style="width: 0%"></div>
                    </div>
                </div>
                <div class="india-glass p-6">
                    <h4 class="text-[10px] font-bold text-gray-500 uppercase">Estimated Tax (2026)</h4>
                    <div class="flex items-baseline gap-2 mt-1">
                        <span class="text-2xl font-bold text-indigo-400">₹</span>
                        <span id="out_tax" class="text-4xl font-bold text-white">0</span>
                    </div>
                </div>
            </div>

            <div class="india-glass p-8">
                <div class="flex items-center justify-between mb-6">
                    <h3 id="report_title" class="text-xs font-bold uppercase tracking-widest text-emerald-400">Tactical Wealth Report</h3>
                    <span id="status_badge" class="text-[9px] font-black px-3 py-1 bg-gray-800 rounded text-gray-500">STANDBY</span>
                </div>
                <div id="report_text" class="text-sm text-gray-400 leading-relaxed italic">
                    Analyze your liquidity across digital and physical nodes to generate a roadmap.
                </div>
                
                <div id="gold_section" class="hidden mt-6 pt-6 border-t border-gray-800">
                    <div class="flex justify-between items-center">
                        <span class="text-[10px] font-bold text-orange-400 uppercase">War-Time Barter Reserve</span>
                        <span id="gold_val" class="text-xl font-bold text-white">0.0g Gold</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let isWar = false;

        function toggleWar() {
            isWar = document.getElementById('war_toggle').checked;
            const inputCard = document.getElementById('input_card');
            const title = document.getElementById('header_title');
            const reportTitle = document.getElementById('report_title');
            const goldSec = document.getElementById('gold_section');

            if(isWar) {
                inputCard.classList.add('crisis-border');
                title.innerText = "CRISIS"; title.className = "text-red-500 ml-1 animate-pulse";
                reportTitle.className = "text-xs font-bold uppercase tracking-widest text-red-500";
                goldSec.classList.remove('hidden');
            } else {
                inputCard.classList.remove('crisis-border');
                title.innerText = "Bharat"; title.className = "text-emerald-500 ml-1";
                reportTitle.className = "text-xs font-bold uppercase tracking-widest text-emerald-400";
                goldSec.classList.add('hidden');
            }
            run();
        }

        function run() {
            const burn = parseFloat(document.getElementById('in_burn').value) || 0;
            const digital = parseFloat(document.getElementById('in_digital').value) || 0;
            const hand = parseFloat(document.getElementById('in_hand').value) || 0;
            const income = parseFloat(document.getElementById('in_income').value) || 0;

            const totalLiquid = digital + hand;
            const runway = burn > 0 ? (totalLiquid / burn).toFixed(1) : 0;
            
            // Tax: India New Regime 2026 (75k Std Deduction + 12L zero-tax slab)
            let taxable = Math.max(0, income - 75000);
            let tax = 0;
            if(taxable > 1200000) {
                if(taxable > 400000) tax += Math.min(400000, taxable - 400000) * 0.05;
                if(taxable > 800000) tax += Math.min(400000, taxable - 800000) * 0.10;
                if(taxable > 1200000) tax += (taxable - 1200000) * 0.15;
                tax *= 1.04;
            }

            document.getElementById('out_runway').innerText = runway;
            document.getElementById('out_tax').innerText = Math.round(tax).toLocaleString('en-IN');
            
            const bar = document.getElementById('runway_bar');
            const target = isWar ? 12 : 6;
            bar.style.width = Math.min((runway/target)*100, 100) + "%";
            bar.style.backgroundColor = runway < target ? "#ef4444" : "#10b981";

            const goldVal = isWar ? (totalLiquid * 0.12 / 8200).toFixed(1) : 0;
            document.getElementById('gold_val').innerText = goldVal + "g Physical Gold";

            const report = document.getElementById('report_text');
            const badge = document.getElementById('status_badge');

            if(totalLiquid > 0) {
                if(isWar) {
                    badge.innerText = "HIGH RISK"; badge.className = "text-[9px] font-black px-3 py-1 bg-red-900/30 rounded text-red-500";
                    report.innerHTML = `<b>Tactical Directive:</b> Your physical cash on hand covers only ${(hand/burn).toFixed(1)} months. In war circumstances, UPI/Digital nodes may fail. <b>Action:</b> Withdraw ₹${Math.max(0, (burn*3)-hand).toLocaleString()} as physical notes and convert surplus into ${goldVal}g of gold coins for barter.`;
                } else {
                    badge.innerText = "NORMAL"; badge.className = "text-[9px] font-black px-3 py-1 bg-emerald-900/30 rounded text-emerald-500";
                    report.innerHTML = `<b>Market Directive:</b> Your liquidity is stable. Keep 1 month of burn in Savings for UPI. Move the investable surplus of ₹${Math.max(0, digital-burn).toLocaleString()} to a <b>Liquid Fund</b> (e.g., HDFC or ICICI Liquid) for 6.7% annualized returns.`;
                }
            }
        }
    </script>
</body>
</html>
